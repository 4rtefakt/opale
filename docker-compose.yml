services:
  api:
    build: { context: ., dockerfile: api/Dockerfile }
    restart: unless-stopped
    env_file: .env
    ports: ["3010:3010"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./front:/app/front:ro
      # Agent Go : binaire et clé privée de signature montés à part pour
      # éviter qu'un rebuild ne nécessite de re-builder l'image API.
      - ./agent-go/dist:/app/agent-go/dist:ro
      - ./agent-go/keys/signing.key:/app/agent-go/keys/signing.key:ro
      - ./agent-go/keys/laps.key:/app/agent-go/keys/laps.key:ro

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Classifieur du pont mail ↔ tickets (issue #8, module email-bridge).
  # Modèle qwen2.5:3b : multilingue FR/EN, fiable en sortie JSON stricte,
  # tient en RAM CPU (~3 GB). Volume persistant pour ne pas re-pull à chaque
  # déploiement. Pas de port exposé : seule l'API y accède via DNS interne.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama

  # One-shot : pull du modèle au premier démarrage. Idempotent (no-op si
  # déjà présent). Pour changer de modèle :
  #   1. OLLAMA_PULL_MODEL=<nouveau> docker compose run --rm ollama-init
  #   2. UPDATE settings SET value='<nouveau>' WHERE key='mail.classifier.model';
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_PULL_MODEL: ${OLLAMA_PULL_MODEL:-qwen2.5:3b}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull "$$OLLAMA_PULL_MODEL"
    restart: "no"

volumes:
  pgdata:
  ollama_models:
